<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ootak Restaurant | Islamabad Official Preview</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --beige: #F5E6D3;
            --dark-brown: #3E2723;
            --orange: #E67E22;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--beige); color: var(--dark-brown); overflow-x: hidden; }

        /* --- 1. CINEMATIC INTRO ANIMATION --- */
        #intro-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--beige); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .intro-bg-blur {
            position: absolute; width: 60%; opacity: 0.1; filter: blur(15px);
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .ootak-letters { position: relative; z-index: 10; display: flex; gap: 15px; }
        .ootak-letters span {
            font-family: 'Playfair Display', serif; font-size: clamp(3rem, 10vw, 6rem);
            font-weight: bold; color: var(--dark-brown);
            opacity: 0; transform: translateY(30px); display: inline-block;
        }

        /* Theatre Curtains - SPEED ADJUSTED TO 0.8s */
        .curtain {
            position: absolute; left: 0; width: 100%; height: 50.5%;
            background: var(--dark-brown); z-index: 10000;
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }
        #curtain-top { top: 0; border-bottom: 2px solid var(--orange); }
        #curtain-bottom { bottom: 0; border-top: 2px solid var(--orange); }

        /* --- 2. HEADER --- */
        header {
            position: fixed; top: 0; width: 100%; padding: 15px 8%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(62, 39, 35, 0.95); z-index: 1000;
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--orange);
        }
        .nav-logo { height: 55px; border-radius: 5px; border: 1px solid var(--orange); }
        nav { display: flex; gap: 25px; }
        nav a { color: var(--beige); text-decoration: none; font-weight: 600; font-size: 0.85rem; letter-spacing: 1px; transition: 0.3s; }
        nav a:hover { color: var(--orange); }

        /* --- 3. HERO SECTION --- */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url('image_96c7a6.jpg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: white; padding: 20px;
        }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(3.5rem, 12vw, 7rem); color: var(--orange); line-height: 1; margin-bottom: 10px; }
        .hero p { font-size: 1.4rem; font-weight: 300; max-width: 800px; letter-spacing: 1px; }

        .btn { padding: 18px 40px; border-radius: 4px; font-weight: bold; text-decoration: none; transition: 0.4s; display: inline-block; margin: 15px; letter-spacing: 1px; }
        .btn-primary { background: var(--orange); color: white; border: none; }
        .btn-outline { border: 2px solid white; color: white; }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.4); filter: brightness(1.1); }

        /* --- 4. SECTIONS --- */
        section { padding: 100px 10%; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 3.5rem; text-align: center; margin-bottom: 50px; }
        .section-title span { color: var(--orange); }

        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .menu-card { 
            background: var(--beige); padding: 30px; border-radius: 12px; transition: 0.4s; 
            border-left: 5px solid transparent; 
        }
        .menu-card:hover { transform: scale(1.03); border-left: 5px solid var(--orange); }

        .whatsapp-float {
            position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white;
            width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 35px; z-index: 2000; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        footer { background: var(--dark-brown); color: var(--beige); padding: 60px 10%; text-align: center; }

        @media (max-width: 768px) {
            nav { display: none; }
            .section-title { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div id="intro-loader">
        <img src="image_96c7cb.jpg" class="intro-bg-blur">
        <div class="ootak-letters" id="letter-container">
            <span>O</span><span>O</span><span>T</span><span>A</span><span>K</span>
        </div>
        <div id="curtain-top" class="curtain"></div>
        <div id="curtain-bottom" class="curtain"></div>
    </div>

    <header>
        <img src="image_96c7cb.jpg" class="nav-logo" alt="Ootak Logo">
        <nav>
            <a href="#home">HOME</a>
            <a href="#menu">MENU</a>
            <a href="#location">LOCATION</a>
            <a href="#contact">CONTACT</a>
        </nav>
    </header>

    <section class="hero" id="home">
        <h1 data-aos="fade-down">Ootak Restaurant</h1>
        <p data-aos="fade-up" data-aos-delay="200">Reinventing the Soul of Desi Cuisine in Islamabad</p>
        <div data-aos="zoom-in" data-aos-delay="400">
            <a href="#menu" class="btn btn-primary">VIEW MENU</a>
            <a href="#location" class="btn btn-outline">FIND US</a>
        </div>
    </section>

    <section id="menu">
        <h2 class="section-title">Menu <span>Preview</span></h2>
        <div class="menu-grid">
            <div class="menu-card" data-aos="flip-left">
                <h3 style="color:var(--orange)">Chicken Karahi</h3>
                <p>Rs. 1,850</p>
            </div>
            <div class="menu-card" data-aos="flip-left" data-aos-delay="100">
                <h3 style="color:var(--orange)">Mutton Shinwari</h3>
                <p>Rs. 2,900</p>
            </div>
        </div>
    </section>

    <a href="https://wa.me/923135135811" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        window.onload = () => {
            const letters = document.querySelectorAll('.ootak-letters span');
            
            // Reveal letters faster
            letters.forEach((l, i) => {
                setTimeout(() => {
                    l.style.opacity = '1';
                    l.style.transform = 'translateY(0)';
                    l.style.transition = '0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                }, i * 200); // 200ms between letters instead of 300
            });

            // OPEN CURTAINS QUICKER
            setTimeout(() => {
                document.getElementById('curtain-top').style.transform = 'translateY(-100%)';
                document.getElementById('curtain-bottom').style.transform = 'translateY(100%)';
                
                setTimeout(() => {
                    document.getElementById('intro-loader').style.display = 'none';
                    document.body.style.overflow = 'auto';
                }, 800); // Clean up loader faster
            }, (letters.length * 200) + 300); // Only 300ms pause after last letter
        };
    </script>
</body>
</html>
